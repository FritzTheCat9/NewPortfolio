name: Frontend Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: new-portfolio
        run: npm install

      - name: Build project
        working-directory: new-portfolio
        run: npm run build
        env:
          BASE_PATH: "/NewPortfolio"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: new-portfolio/build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
